name: CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest
    name: Build & Test

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: dotnet restore SpotifyWidget.sln

    - name: Build Main Project
      run: msbuild src/SpotifyWidget/SpotifyWidget.csproj /p:Configuration=${{ env.CONFIGURATION }} /p:Platform=${{ env.PLATFORM }} /p:RuntimeIdentifier=win-${{ env.PLATFORM }}

    - name: Build Test Project
      run: msbuild tests/SpotifyWidget.Tests/SpotifyWidget.Tests.csproj /p:Configuration=${{ env.CONFIGURATION }} /p:Platform=${{ env.PLATFORM }} /p:RuntimeIdentifier=win-${{ env.PLATFORM }}

    - name: Run Tests
      run: |
        dotnet test tests/SpotifyWidget.Tests/SpotifyWidget.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --logger trx --results-directory TestResults

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ env.PLATFORM }}
        path: TestResults/
        retention-days: 7

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SpotifyWidget-${{ env.PLATFORM }}-${{ env.CONFIGURATION }}
        path: |
          src/SpotifyWidget/bin/${{ env.PLATFORM }}/${{ env.CONFIGURATION }}/
          !src/SpotifyWidget/bin/${{ env.PLATFORM }}/${{ env.CONFIGURATION }}/*.pdb
        retention-days: 7

  release:
    runs-on: windows-latest
    name: Create Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download x64 Artifacts
      uses: actions/download-artifact@v4
      with:
        name: SpotifyWidget-x64-Release
        path: artifacts/x64

    - name: Zip Artifacts
      run: |
        Compress-Archive -Path artifacts/x64/* -DestinationPath SpotifyWidget-x64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          SpotifyWidget-x64.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}